name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `pip show pypi-winnow-downloads` or commit hash
      placeholder: "e.g., 0.1.x, or a commit SHA if testing main"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.13.5"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: Distro + release for Linux; macOS / Windows otherwise
      placeholder: "Debian 13 trixie"
    validations:
      required: true
  - type: dropdown
    id: deploy
    attributes:
      label: Deployment shape
      options:
        - Bare systemd (deploy/systemd reference)
        - Docker / Compose (deploy/docker reference)
        - Manual `winnow-collect --config ...`
        - Other (describe below)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: |
        Paste the relevant slice of your `config.yaml` (redact the
        `credential_file` path if it discloses anything sensitive).
        For per-package issues, include the package's `window_days` and
        any other tuning.
      render: yaml
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `winnow-collect --config /path/to/config.yaml`
        2. Inspect output JSON / `_health.json`
        3. See ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Run with `--verbose` and paste any error messages or stack traces.
      render: shell
    validations:
      required: false
