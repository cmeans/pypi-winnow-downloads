name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Collector / pypinfo invocation
        - Badge generation / shields.io endpoint shape
        - New badge variant (installer mix, OS breakdown, etc.)
        - Config schema (config.yaml)
        - CLI / `winnow-collect`
        - Deploy artifacts (systemd / Caddy / Docker)
        - Documentation
        - CI / release / packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope check
      description: |
        v1 deliberately excludes a database, web framework, user-supplied
        package API, auth, backfill, and a web UI. If your idea touches
        any of these, briefly note why it's still in scope or what scope
        expansion you're proposing.
    validations:
      required: false
