name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify CHANGELOG entry for tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qE "^## \[${VERSION}\] - " CHANGELOG.md; then
            echo "::error::No CHANGELOG section found for v${VERSION}. Add a '## [${VERSION}] - YYYY-MM-DD' heading before tagging."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract CHANGELOG section for tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            found && /^## \[/ { exit }
            found && /^\[[^]]+\]:[[:space:]]/ { exit }
            $0 ~ "^## \\[" ver "\\] -" { found=1; next }
            found { lines[++n] = $0 }
            END {
              start = 1
              while (start <= n && lines[start] == "") start++
              end = n
              while (end >= start && lines[end] == "") end--
              for (i = start; i <= end; i++) print lines[i]
            }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::Extracted empty release notes for v${VERSION} — CHANGELOG section is missing or empty."
            exit 1
          fi
          echo "----- release notes preview -----"
          cat release_notes.md
          echo "----- end preview -----"

      - name: Detect prerelease
        id: prerelease
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE_FLAG: ${{ steps.prerelease.outputs.flag }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md \
            $PRERELEASE_FLAG
